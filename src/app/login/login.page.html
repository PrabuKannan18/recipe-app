<ion-content [fullscreen]="true" class="auth-content">
  <div class="auth-wrapper">
    <!-- Top Branding -->
    <div class="branding">
      <div class="logo-box">
        <ion-icon name="restaurant"></ion-icon>
      </div>
      <h1>Welcome Back</h1>
      <p>Login to your account to continue</p>
    </div>

    <!-- Login Form -->
    <div class="form-container">
      <ion-item lines="none" class="login-item">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input 
          label="Email Address" 
          labelPlacement="stacked" 
          type="email" 
          [(ngModel)]="email" 
          placeholder="e.g. name@example.com">
        </ion-input>
      </ion-item>

      <ion-item lines="none" class="login-item ion-margin-top">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input 
          label="Password" 
          labelPlacement="stacked" 
          type="password" 
          [(ngModel)]="password" 
          placeholder="••••••••">
          <ion-input-password-toggle slot="end"></ion-input-password-toggle>
        </ion-input>
      </ion-item>

      <div class="forgot-row">
        <ion-button fill="clear" color="primary" size="small" routerLink="/reset-password">
          Forgot Password?
        </ion-button>
      </div>

      <ion-button expand="block" shape="round" class="premium-btn auth-btn" (click)="login()">
        <span *ngIf="!isLoading">Log In</span>
        <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
      </ion-button>
    </div>

    <!-- Divider -->
    <div class="divider">
      <span>OR</span>
    </div>

    <!-- Social Login -->
    <div class="social-row">
      <ion-button expand="block" fill="outline" shape="round" class="social-btn" (click)="signInWithGoogle()">
        <ion-icon name="logo-google" slot="start"></ion-icon>
        Continue with Google
      </ion-button>
    </div>

    <!-- Signup Link -->
    <div class="footer-link">
      <p>Don't have an account? <a routerLink="/signup">Sign Up</a></p>
    </div>
  </div>

  <!-- Background Decoration -->
  <div class="decor-circle circle-1"></div>
  <div class="decor-circle circle-2"></div>
</ion-content>
