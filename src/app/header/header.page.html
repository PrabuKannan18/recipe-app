<ion-header class="ion-no-border premium-header">
  <ion-toolbar color="light" class="ion-padding-horizontal">
    <!-- Left: Location Selection -->
    <ion-buttons slot="start">
      <div class="location-container" (click)="selectLocation()">
        <div class="location-top">
          <ion-icon name="location-outline" color="primary"></ion-icon>
          <ion-label class="location-label">Home</ion-label>
          <ion-icon name="chevron-down-outline" class="chevron-icon"></ion-icon>
        </div>
        <ion-text color="medium" class="address-text">24, Royal Garden, Chennai...</ion-text>
      </div>
    </ion-buttons>

    <!-- Center: Logo -->
    <!-- <ion-title class="ion-text-center">
      <img src="assets/imgs/recipe.jpg" class="header-logo" alt="Logo">
    </ion-title> -->

    <!-- Right: Actions -->
    <ion-buttons slot="end">
      <ion-button class="action-btn" [routerLink]="['/search']">
        <ion-icon name="search" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button class="action-btn" [routerLink]="['/myaccount']">
        <ion-icon name="person-circle-outline" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button id="cart-button" class="action-btn cart-btn" [routerLink]="['/cart']">
        <ion-icon name="cart-outline" slot="icon-only"></ion-icon>
        <ion-badge *ngIf="cartCount > 0" color="primary" class="cart-badge">{{ cartCount }}</ion-badge>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <!-- Optional Sub-header Search Bar (Swiggy Style) -->
  <div class="search-bar-row ion-padding" *ngIf="showSearch">
    <div class="search-input-container">
      <ion-icon name="search-outline"></ion-icon>
      <ion-input placeholder="Search for food or restaurants" [routerLink]="['/search']" readonly></ion-input>
    </div>
  </div>
</ion-header>
