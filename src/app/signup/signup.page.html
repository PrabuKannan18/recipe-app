<ion-content [fullscreen]="true" class="auth-content">
  <div class="auth-wrapper">
    <!-- Top Branding -->
    <div class="branding">
      <div class="logo-box">
        <ion-icon name="restaurant"></ion-icon>
      </div>
      <h1>Create Account</h1>
      <p>Join our food community today</p>
    </div>

    <!-- Signup Form -->
    <div class="form-container">
      <ion-item lines="none" class="auth-item">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input label="Email Address" labelPlacement="stacked" placeholder="e.g. name@example.com" type="email"
          [(ngModel)]="email">
        </ion-input>
      </ion-item>


      <ion-item lines="none" class="auth-item ion-margin-top">
        <ion-icon name="people-outline" slot="start"></ion-icon>
        <ion-select label="Role" labelPlacement="stacked" [(ngModel)]="role">
          <ion-select-option value="member">I am an Employee</ion-select-option>
          <ion-select-option value="manager">I am an Owner/Manager</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item lines="none" class="auth-item ion-margin-top" *ngIf="role === 'manager'">
        <ion-icon name="business-outline" slot="start"></ion-icon>
        <ion-input label="Organization Name" labelPlacement="stacked" placeholder="e.g. Tasty Foods Ltd" type="text"
          [(ngModel)]="orgName">
        </ion-input>
      </ion-item>

      <ion-item lines="none" class="auth-item ion-margin-top" *ngIf="role === 'member'">
        <ion-icon name="key-outline" slot="start"></ion-icon>
        <ion-input label="Join Code" labelPlacement="stacked" placeholder="e.g. AG7X92" type="text"
          [(ngModel)]="joinCode">
        </ion-input>
      </ion-item>

      <ion-item lines="none" class="auth-item ion-margin-top">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input label="Password" labelPlacement="stacked" placeholder="••••••••" type="password"
          [(ngModel)]="password">
          <ion-input-password-toggle slot="end"></ion-input-password-toggle>
        </ion-input>
      </ion-item>

      <ion-item lines="none" class="auth-item ion-margin-top">
        <ion-icon name="shield-checkmark-outline" slot="start"></ion-icon>
        <ion-input label="Confirm Password" labelPlacement="stacked" placeholder="••••••••" type="password"
          [(ngModel)]="cpassword">
          <ion-input-password-toggle slot="end"></ion-input-password-toggle>
        </ion-input>
      </ion-item>

      <ion-button expand="block" shape="round" class="premium-btn auth-btn ion-margin-top" (click)="signup()">
        <span *ngIf="!isLoading">Create Account</span>
        <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
      </ion-button>
    </div>

    <!-- Divider -->
    <div class="divider">
      <span>OR</span>
    </div>

    <!-- social-row -->
    <div class="social-row">
      <ion-button expand="block" fill="outline" shape="round" class="social-btn" (click)="googleSignup()">
        <ion-icon name="logo-google" slot="start"></ion-icon>
        Sign up with Google
      </ion-button>
    </div>

    <!-- Login Link -->
    <div class="footer-link">
      <p>Already have an account? <a routerLink="/login">Log In</a></p>
    </div>
  </div>

  <!-- Background Decoration -->
  <div class="decor-circle circle-1"></div>
  <div class="decor-circle circle-2"></div>
</ion-content>
